name: Remove source localization markers

on:
  push:
    branches:
      - docs/add-rag-concept

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/add-rag-concept
          fetch-depth: 0

      - name: Clean default-locale sources
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          marker = re.compile(
              r'\n?<!--\s*\nai_content:\s*\n\s*managed:\s*true\s*\n\s*l10n:\s*true\s*\n-->\s*\n?',
              re.M,
          )

          changed = 0
          for path in Path('.').rglob('*.md'):
              normalized = path.as_posix()
              if '/l10n/' in normalized or normalized.startswith('l10n/'):
                  continue
              text = path.read_text(encoding='utf-8')
              updated, count = marker.subn('\n', text)
              if count:
                  updated = updated.replace('\n\n\n', '\n\n')
                  path.write_text(updated, encoding='utf-8')
                  changed += 1

          allowed_localizations = {
              'docs/notes/sub/concepts/l10n/uk_UA/README.md',
              'docs/notes/sub/concepts/sub/training-and-adaptation/sub/lora/l10n/uk_UA/README.md',
          }
          root = Path('docs/notes/sub/concepts')
          for path in root.rglob('l10n/uk_UA/README.md'):
              if path.as_posix() not in allowed_localizations:
                  path.unlink()
                  parent = path.parent
                  while parent != root and parent.exists() and not any(parent.iterdir()):
                      parent.rmdir()
                      parent = parent.parent

          print(f'removed source markers from {changed} Markdown files')
          PY

          rm -f .github/workflows/sync-concept-l10n.yml
          rm -f .sync-concept-l10n-trigger

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Remove source localization markers"
          git push origin HEAD:docs/add-rag-concept
