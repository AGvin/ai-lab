name: Clean concept translation navigation

on:
  push:
    branches:
      - docs/add-rag-concept

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/add-rag-concept
          fetch-depth: 0

      - name: Remove links to missing localizations
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path('docs/notes/sub/concepts')
          block = re.compile(
              r'\n## Translations\n\n- English — current\n- \[Українська\]\(\./l10n/uk_UA/\)\n?',
              re.M,
          )

          changed = 0
          for source in root.rglob('README.md'):
              if '/l10n/' in source.as_posix():
                  continue
              localized = source.parent / 'l10n/uk_UA/README.md'
              if localized.exists():
                  continue
              text = source.read_text(encoding='utf-8')
              updated, count = block.subn('', text, count=1)
              if count:
                  source.write_text(updated, encoding='utf-8')
                  changed += 1

          print(f'removed invalid translation navigation from {changed} pages')
          PY

          rm -f .github/workflows/clean-concept-translation-navigation.yml
          rm -f .clean-concept-translation-navigation-trigger

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Remove links to missing concept localizations"
          git push origin HEAD:docs/add-rag-concept
